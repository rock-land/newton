services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: newton-timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newton}
      POSTGRES_USER: ${POSTGRES_USER:-newton}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newton_dev_password}
    volumes:
      - newton_timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newton} -d ${POSTGRES_DB:-newton}"]
      interval: 10s
      timeout: 5s
      retries: 12

  newton:
    build: .
    container_name: newton-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-newton}
      POSTGRES_USER: ${POSTGRES_USER:-newton}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newton_dev_password}
      OANDA_API_TOKEN: ${OANDA_API_TOKEN:-}
      OANDA_ACCOUNT_ID: ${OANDA_ACCOUNT_ID:-}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  newton_timescaledb_data:
